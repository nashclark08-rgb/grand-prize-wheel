  <title>The Grand Prize Wheel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee+Shade&family=Bungee&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Lora', Georgia, serif; background: #4a0814; }
    #root { min-height: 100vh; }
    .startup-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; z-index: 999;
      background: radial-gradient(ellipse at top, #7a1226 0%, #4a0814 55%, #2d0510 100%);
      color: #FFD23F; font-family: 'Bungee', system-ui, sans-serif;
    }
    @keyframes startup-spin { to { transform: rotate(360deg); } }
    .startup-loader .ring {
      width: 70px; height: 70px;
      border: 6px solid rgba(255, 210, 63, 0.2);
      border-top-color: #FFD23F;
      border-radius: 50%;
      animation: startup-spin 1s linear infinite;
    }
    .startup-loader .label {
      font-size: 18px; letter-spacing: 0.12em;
      text-shadow: 2px 2px 0 #5C0A1C, 4px 4px 0 rgba(0,0,0,0.4);
    }
    .startup-loader .sublabel {
      font-size: 11px; opacity: 0.6; max-width: 320px; text-align: center;
      font-family: 'Lora', Georgia, serif; letter-spacing: 0.02em; line-height: 1.5;
      padding: 0 16px;
    }
  </style>
</head>

      <div class="label">LOADING THE PRIZE WHEEL…</div>

    const Gift         = (p) => <Icon {...p}><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 5 12 8c0-3 1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></Icon>;
    const Brain        = (p) => <Icon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></Icon>;
    const FastForward  = (p) => <Icon {...p}><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></Icon>;

    const Clock        = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const Flame        = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
    const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;


// ---------- Carnival palette ----------
const PALETTE = [
  '#C8102E', '#FFD23F', '#1A2A6C', '#FDF6E3',
  '#0F8B8D', '#E76F51', '#264653', '#F4A261',
];
const SECTOR_TEXT = ['#FDF6E3', '#1A2A6C', '#FDF6E3', '#1A2A6C', '#FDF6E3', '#1A2A6C', '#FDF6E3', '#1A2A6C'];
const GOLD = '#D4A017';
const GOLD_LIGHT = '#FFD23F';
const DEEP_RED = '#5C0A1C';
const CREAM = '#F5E6C8';

// ---------- Inverse / midnight palette ----------
const INVERSE_PALETTE = [
  '#06B6D4', '#1E1B4B', '#A78BFA', '#F0F9FF',
  '#10B981', '#7C3AED', '#0EA5E9', '#FBBF24',
];
const INVERSE_TEXT  = ['#0F172A', '#F0F9FF', '#0F172A', '#1E1B4B', '#0F172A', '#F0F9FF', '#0F172A', '#1E1B4B'];
const SILVER = '#CBD5E1';
const SILVER_LIGHT = '#F0F9FF';
const NIGHT = '#0F172A';
const NIGHT_DARK = '#020617';

// ---------- Defaults ----------
const DEFAULT_BOXES = [
  'Extra Recess', 'Homework Pass', 'Lunch with Teacher',
  'Pick Class Music', 'Front of Lunch Line', 'Sticker Pack',
  'Surprise Snack', 'Choose a Game', 'Movie Friday',
];
const DEFAULT_NUMBERS = ['2', '4', '6', '3', '8', '5', '10', '1'];

// ---------- localStorage persistence ----------
// Persists teacher's setup across reloads. Images intentionally excluded
// (base64 data-URLs blow the 5MB localStorage quota). Bump the version key
// if the saved shape ever changes incompatibly.
const STORAGE_KEY = 'gpw_config_v1';
const PERSIST_KEYS = [
  'titleLine1', 'titleLine2', 'sectors', 'biased', 'removeWinner',
  'spinDuration', 'celebration', 'soundOn', 'removeBg', 'bgTolerance',
  'boxes', 'correctAnswer', 'timerEnabled', 'timerDuration', 'numberSectors',
];
function loadSavedConfig() {
  try {
    const raw = typeof localStorage !== 'undefined' && localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === 'object') ? parsed : null;
  } catch { return null; }
}
function pickSaved(saved, key, fallback) {
  return saved && saved[key] !== undefined ? saved[key] : fallback;
}

// ---------- Image background removal (canvas flood-fill) ----------
function processImage(originalUrl, removeBg, tolerance) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 600;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxSize || h > maxSize) {
        const scale = maxSize / Math.max(w, h);
        w = Math.floor(w * scale); h = Math.floor(h * scale);
      }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      if (!removeBg) { resolve(canvas.toDataURL('image/png')); return; }

      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;
      const sampleCoords = [
        [0, 0], [w - 1, 0], [0, h - 1], [w - 1, h - 1],
        [(w / 2) | 0, 0], [(w / 2) | 0, h - 1],
        [0, (h / 2) | 0], [w - 1, (h / 2) | 0],
      ];
      let bgR = 0, bgG = 0, bgB = 0, count = 0;
      sampleCoords.forEach(([x, y]) => {
        const idx = (y * w + x) * 4;
        if (data[idx + 3] > 200) { bgR += data[idx]; bgG += data[idx + 1]; bgB += data[idx + 2]; count++; }
      });
      if (count === 0) { resolve(canvas.toDataURL('image/png')); return; }
      bgR /= count; bgG /= count; bgB /= count;

      const visited = new Uint8Array(w * h);
      const stack = [];
      for (let x = 0; x < w; x++) { stack.push(x); stack.push((h - 1) * w + x); }
      for (let y = 0; y < h; y++) { stack.push(y * w); stack.push(y * w + w - 1); }
      const tolSq = tolerance * tolerance;

      while (stack.length > 0) {
        const i = stack.pop();
        if (visited[i]) continue;
        visited[i] = 1;
        const idx = i * 4;
        const a = data[idx + 3];
        let isBg = false;
        if (a === 0) isBg = true;
        else {
          const dr = data[idx] - bgR, dg = data[idx + 1] - bgG, db = data[idx + 2] - bgB;
          if (dr * dr + dg * dg + db * db <= tolSq) { data[idx + 3] = 0; isBg = true; }
        }
        if (!isBg) continue;
        const x = i % w, y = (i / w) | 0;
        if (x > 0) stack.push(i - 1);
        if (x < w - 1) stack.push(i + 1);
        if (y > 0) stack.push(i - w);
        if (y < h - 1) stack.push(i + w);
      }

      const alphaCopy = new Uint8ClampedArray(w * h);
      for (let i = 0; i < w * h; i++) alphaCopy[i] = data[i * 4 + 3];
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = y * w + x;
          if (alphaCopy[i] === 0) continue;
          const transparentNeighbors =
            (alphaCopy[i - 1] === 0 ? 1 : 0) + (alphaCopy[i + 1] === 0 ? 1 : 0) +
            (alphaCopy[i - w] === 0 ? 1 : 0) + (alphaCopy[i + w] === 0 ? 1 : 0);
          if (transparentNeighbors > 0) data[i * 4 + 3] = Math.max(0, alphaCopy[i] - transparentNeighbors * 50);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = originalUrl;
  });
}

function CarnivalSpinner() {
  // Load any previously-saved teacher setup once at mount.
  const savedConfig = loadSavedConfig();
  const pick = (k, def) => pickSaved(savedConfig, k, def);

  // ----- Title -----
  const [titleLine1, setTitleLine1] = useState(() => pick('titleLine1', 'THE GRAND'));
  const [titleLine2, setTitleLine2] = useState(() => pick('titleLine2', 'PRIZE WHEEL'));

  // ----- Main wheel -----
  const [sectors, setSectors] = useState(() => {
    const savedSectors = pick('sectors', null);
    if (Array.isArray(savedSectors) && savedSectors.length >= 2) return savedSectors;
    return Array.from({ length: 6 }, (_, i) => ({
      id: `s_${Date.now()}_${i}`, label: `Player ${i + 1}`, weight: 1,
    }));
  });
  const [biased, setBiased] = useState(() => pick('biased', false));
  const [removeWinner, setRemoveWinner] = useState(() => pick('removeWinner', false));
  const [spinDuration, setSpinDuration] = useState(() => pick('spinDuration', 7));
  const [celebration, setCelebration] = useState(() => pick('celebration', 'confetti'));
  const [soundOn, setSoundOn] = useState(() => pick('soundOn', true));

  const [rotation, setRotation] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [winner, setWinner] = useState(null);
  const [showWinner, setShowWinner] = useState(false);

  const [marqueeStep, setMarqueeStep] = useState(0);

  // ----- Center image -----
  const [originalDataUrl, setOriginalDataUrl] = useState(null);
  const [userImage, setUserImage] = useState(null);
  const [removeBg, setRemoveBg] = useState(() => pick('removeBg', true));
  const [bgTolerance, setBgTolerance] = useState(() => pick('bgTolerance', 40));
  const [processing, setProcessing] = useState(false);

  // ----- Settings sections -----
  const [openSection, setOpenSection] = useState({
    title: false, players: true, image: false,
    spin: false, boxes: false, question: false, numbers: false,
  });
  const toggleSection = (k) => setOpenSection((p) => ({ ...p, [k]: !p[k] }));

  // ----- Prize boxes -----
  const [boxes, setBoxes] = useState(() => {
    const savedBoxes = pick('boxes', null);
    if (Array.isArray(savedBoxes) && savedBoxes.length === 9) return savedBoxes;
    return DEFAULT_BOXES;
  });

  // ----- Bonus question (image-based) -----
  const [questionImage, setQuestionImage] = useState(null);     // teacher's question photo
  const [incorrectImage, setIncorrectImage] = useState(null);   // teacher's "wrong!" graphic (optional)
  const [correctAnswer, setCorrectAnswer] = useState(() => pick('correctAnswer', 1)); // 0..3 = A..D

  // ----- Timer -----
  const [timerEnabled, setTimerEnabled] = useState(() => pick('timerEnabled', true));
  const [timerDuration, setTimerDuration] = useState(() => pick('timerDuration', 30));
  const [timeLeft, setTimeLeft] = useState(30);
  const [timerExpired, setTimerExpired] = useState(false);
  const [showBoom, setShowBoom] = useState(false);

  // ----- Number spinner -----
  const [numberSectors, setNumberSectors] = useState(() => {
    const savedNums = pick('numberSectors', null);
    if (Array.isArray(savedNums) && savedNums.length >= 2) return savedNums;
    return DEFAULT_NUMBERS.map((n, i) => ({ id: `n_${i}`, label: n, weight: 1 }));
  });
  const [numberRotation, setNumberRotation] = useState(0);
  const [numberSpinning, setNumberSpinning] = useState(false);
  const [numberWinner, setNumberWinner] = useState(null);

  // ----- Prize-round flow -----
  // 'main' | 'choice' | 'question' | 'verdict' | 'wrongResult' | 'numberSpin' | 'boxes' | 'final'
  const [view, setView] = useState('main');
  const [studentAnswer, setStudentAnswer] = useState(null);
  const [celebrationCount, setCelebrationCount] = useState(1);
  const [selectedBox, setSelectedBox] = useState(null);
  const [bonusOutcome, setBonusOutcome] = useState(null); // 'skipped' | 'correct' | 'incorrect' | 'timeout'

  // When backing into the question screen from verdict, we don't want the fuse
  // timer to restart — the student has already submitted, the teacher is just
  // letting them re-read. Consumed once on next question-view entry.
  const [skipTimerOnce, setSkipTimerOnce] = useState(false);

  // ----- Refs -----
  const audioCtxRef = useRef(null);
  const lastSectorRef = useRef(-1);
  const animFrameRef = useRef(null);
  const numberAnimFrameRef = useRef(null);
  const lastNumberSectorRef = useRef(-1);
  const celebCanvasRef = useRef(null);
  const fileInputRef = useRef(null);
  const questionImageRef = useRef(null);
  const incorrectImageRef = useRef(null);
  const timerStartRef = useRef(null);
  const timerRafRef = useRef(null);

  // ----- Marquee chase -----
  useEffect(() => {
    const id = setInterval(() => setMarqueeStep((s) => s + 1), 180);
    return () => clearInterval(id);
  }, []);

  // ----- Re-process center image -----
  useEffect(() => {
    if (!originalDataUrl) return;
    let cancelled = false;
    setProcessing(true);
    const t = setTimeout(async () => {
      const out = await processImage(originalDataUrl, removeBg, bgTolerance);
      if (!cancelled) {
        if (out) setUserImage(out);
        setProcessing(false);
      }
    }, 220);
    return () => { cancelled = true; clearTimeout(t); };
  }, [originalDataUrl, removeBg, bgTolerance]);

  // ----- Auto-save teacher setup to localStorage (debounced) -----
  useEffect(() => {
    const t = setTimeout(() => {
      try {
        const cfg = {
          titleLine1, titleLine2, sectors, biased, removeWinner,
          spinDuration, celebration, soundOn, removeBg, bgTolerance,
          boxes, correctAnswer, timerEnabled, timerDuration, numberSectors,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
      } catch {
        // Quota exceeded or storage disabled — fail silently; in-memory state still works.
      }
    }, 400);
    return () => clearTimeout(t);
  }, [
    titleLine1, titleLine2, sectors, biased, removeWinner,
    spinDuration, celebration, soundOn, removeBg, bgTolerance,
    boxes, correctAnswer, timerEnabled, timerDuration, numberSectors,
  ]);

  // ----- Timer countdown (only while in 'question' view) -----
  useEffect(() => {
    if (view !== 'question' || !timerEnabled) {
      setTimeLeft(timerDuration);
      setTimerExpired(false);
      if (timerRafRef.current) cancelAnimationFrame(timerRafRef.current);
      return;
    }

    // Re-entering question via "Back" from verdict: skip the countdown.
    if (skipTimerOnce) {
      setSkipTimerOnce(false);
      setTimerExpired(false);
      if (timerRafRef.current) cancelAnimationFrame(timerRafRef.current);
      return;
    }

    setTimeLeft(timerDuration);
    setTimerExpired(false);
    timerStartRef.current = performance.now();

    const tick = () => {
      const elapsed = (performance.now() - timerStartRef.current) / 1000;
      const remaining = Math.max(0, timerDuration - elapsed);
      setTimeLeft(remaining);
      if (remaining <= 0) {
        handleTimerExpire();
        return;
      }
      timerRafRef.current = requestAnimationFrame(tick);
    };
    timerRafRef.current = requestAnimationFrame(tick);

    return () => {
      if (timerRafRef.current) cancelAnimationFrame(timerRafRef.current);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [view, timerEnabled, timerDuration]);

  // ----- Audio -----
  const getCtx = () => {
    if (!audioCtxRef.current && typeof window !== 'undefined') {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtxRef.current = new Ctx();
    }
    return audioCtxRef.current;
  };
  const tone = (freq, dur, type = 'square', gain = 0.08, when = 0, slideTo = null) => {
    if (!soundOn) return;
    const ctx = getCtx(); if (!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    const t0 = ctx.currentTime + when;
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo !== null) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);

      { f: 659.25, t: 0.13, d: 0.13 },

  // ----- Spin (main) -----

  // ----- Wheel renderer (used by both wheels) -----
  const SVG_SIZE = 640;
  const C = SVG_SIZE / 2;
  const R = 280;
  const polar = (angDeg, rad) => {
    const a = ((angDeg - 90) * Math.PI) / 180;
    return { x: C + rad * Math.cos(a), y: C + rad * Math.sin(a) };
  };
  const buildSectorPath = (i, angle) => {
    const a0 = i * angle, a1 = (i + 1) * angle;
    const p0 = polar(a0, R), p1 = polar(a1, R);
    const large = angle > 180 ? 1 : 0;
    return `M ${C} ${C} L ${p0.x} ${p0.y} A ${R} ${R} 0 ${large} 1 ${p1.x} ${p1.y} Z`;
  };

  const renderWheelSVG = ({
    sectorList, rotationVal, palette, textColors, accent, accentLight, border,

    const labelFontSize = Math.max(11, Math.min(26, 170 / sectorList.length + 6));
    // Label fits along the radial direction. Available radial width is finite,
    // so cap chars based on font size: small font (many sectors) can fit long
    // names; large font (few sectors) needs tighter truncation.
    const labelCharLimit = Math.max(10, Math.floor(220 / (labelFontSize * 0.55)));
    const NUM_LIGHTS = 32;
    const lightArr = Array.from({ length: NUM_LIGHTS }, (_, i) => {
      const ang = (i / NUM_LIGHTS) * 360;
      const pos = polar(ang, R + 24);
      const on = (i + marqueeStep) % 2 === 0;
      return { ...pos, on };
    });
    const CENTER_R = R * 0.30;
    const clipId = `clip_${centerImg ? 'img' : 'plain'}_${Math.random().toString(36).slice(2, 7)}`;

    return (
      <svg viewBox={`0 0 ${SVG_SIZE} ${SVG_SIZE}`} className="absolute inset-0 w-full h-full" style={{ overflow: 'visible' }}>
        <defs>
          <clipPath id={clipId}><circle cx={C} cy={C} r={CENTER_R} /></clipPath>
        </defs>
        {lightArr.map((l, i) => (
          <circle
            key={i} cx={l.x} cy={l.y} r={7}
            fill={l.on ? marqueeOnFill : marqueeOffFill}
            style={l.on ? { filter: `drop-shadow(0 0 8px ${marqueeOnFill}) drop-shadow(0 0 16px ${lightGlow})` } : undefined}
          />
        ))}
        <g style={{ transform: `rotate(${rotationVal}deg)`, transformOrigin: `${C}px ${C}px`, willChange: 'transform' }}>
          {sectorList.map((s, i) => (
            <path key={s.id} d={buildSectorPath(i, sa)}
              fill={palette[i % palette.length]} stroke={border} strokeWidth={2} />
          ))}
          {sectorList.map((_, i) => {
            const a = i * sa; const p = polar(a, R);
            return <line key={`div-${i}`} x1={C} y1={C} x2={p.x} y2={p.y} stroke={accent} strokeWidth={1.5} opacity={0.5} />;
          })}
          {sectorList.map((s, i) => {
            const center = i * sa + sa / 2;
            const pos = polar(center, R * 0.66);
            const txtColor = textColors[i % textColors.length];

              </g>

            <>

                style={{
                  maxHeight: '30vh', maxWidth: '100%',
                  border: `3px solid ${GOLD}`,
                  background: '#FFF8E7',
                }} />
            )}

            <div className="panel-card rounded-2xl p-6 max-w-2xl mx-auto mb-10 text-left">
              <div className="mb-4">
                <div className="font-bungee text-xs mb-1" style={{ color: DEEP_RED, opacity: 0.7 }}>STUDENT CHOSE</div>
                <div className="font-shade text-4xl" style={{ color: DEEP_RED }}>
                  {['A', 'B', 'C', 'D'][studentAnswer]}
                </div>
              </div>
              <div className="border-t-2 pt-4" style={{ borderColor: 'rgba(92,10,28,0.2)' }}>
                <div className="font-bungee text-xs mb-1" style={{ color: DEEP_RED, opacity: 0.7 }}>CORRECT ANSWER</div>
                <div className="font-shade text-3xl flex items-center gap-2" style={{ color: DEEP_RED }}>
                  ★ {['A', 'B', 'C', 'D'][correctAnswer]}
                </div>
                <div className="text-xs mt-2 font-bungee"
                  style={{ color: studentAnswer === correctAnswer ? '#0F8B8D' : '#C8102E' }}>
                  {studentAnswer === correctAnswer ? '— Matches the student\'s answer' : '— Differs from the student\'s answer'}
                </div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-4 max-w-xl mx-auto">
              <button onClick={markCorrect}
                className="font-shade text-xl sm:text-2xl py-5 rounded-2xl flex flex-col items-center gap-1 transition-transform hover:scale-105"
                style={{
                  background: 'linear-gradient(180deg, #10B981, #059669)',
                  color: '#FDF6E3', border: `4px solid #047857`,
                  boxShadow: '0 8px 0 #047857',
                }}>
                <Check size={32} /> CORRECT
              </button>
              <button onClick={markIncorrect}
                className="font-shade text-xl sm:text-2xl py-5 rounded-2xl flex flex-col items-center gap-1 transition-transform hover:scale-105"
                style={{
                  background: 'linear-gradient(180deg, #EF4444, #B91C1C)',
                  color: '#FDF6E3', border: `4px solid #7F1D1D`,
                  boxShadow: '0 8px 0 #7F1D1D',
                }}>
                <X size={32} /> INCORRECT
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ============== WRONG RESULT ============== */}
      {view === 'wrongResult' && (
        <div className="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-20 fade-in">
          <PrizeRoundHeader />
          <div className="max-w-2xl w-full text-center">
            <p className="font-bungee text-sm tracking-widest mb-2" style={{ color: '#FFD23F' }}>
              {bonusOutcome === 'timeout' ? '✦  TIME\'S UP  ✦' : '✦  NOT QUITE  ✦'}
            </p>
            <h2 className="font-shade text-5xl sm:text-6xl mb-6" style={{ color: '#C8102E', lineHeight: 1 }}>
              {bonusOutcome === 'timeout' ? 'BOOM!' : 'WRONG ANSWER'}
            </h2>

            <div className="mx-auto mb-6 max-w-md">
              {incorrectImage ? (
                <img src={incorrectImage} alt="Incorrect"
                  className="w-full rounded-xl"
                  style={{
                    border: `4px solid ${GOLD}`,
                    boxShadow: `0 0 0 2px ${DEEP_RED}, 0 12px 32px rgba(0,0,0,0.5)`,
                    background: '#FFF8E7',
                  }} />
              ) : (
                <DefaultIncorrectGraphic isTimeout={bonusOutcome === 'timeout'} />
              )}
            </div>

            <p className="font-display text-xl mb-8" style={{ color: '#FDF6E3' }}>
              {bonusOutcome === 'timeout'
                ? 'You ran out of time! Solo prize coming up.'
                : 'No multiplier this round, but still a prize!'}
            </p>

            <button onClick={continueFromWrong}
              className="font-shade text-2xl px-12 py-4 rounded-full transition-transform hover:scale-105 inline-flex items-center gap-3"
              style={{
                background: `linear-gradient(180deg, ${GOLD_LIGHT}, ${GOLD} 45%, #8B6914)`,
                color: DEEP_RED, border: `4px solid ${DEEP_RED}`,
              }}>
              PICK A PRIZE <Gift size={22} />
            </button>
          </div>
        </div>
      )}

      {/* ============== NUMBER SPIN ============== */}
      {view === 'numberSpin' && (
        <div className="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-20 fade-in">
          <PrizeRoundHeader palette="inverse" />
          <div className="text-center mb-4">
            <p className="font-bungee text-xs sm:text-sm tracking-widest" style={{ color: SILVER_LIGHT }}>
              ✦  YOU GOT IT RIGHT — SPIN FOR CELEBRATION SIZE  ✦
            </p>
            <h2 className="font-shade title-shimmer-cool text-4xl sm:text-6xl mt-2" style={{ color: SILVER_LIGHT, lineHeight: 1 }}>
              HOW MANY<br /><span style={{ color: '#A78BFA' }}>CELEBRATE?</span>
            </h2>
          </div>

          <div className="relative w-full max-w-[600px] aspect-square">
            <div className="absolute inset-2 rounded-full ornate-border-cool" style={{ padding: 14 }} />
            <div className="absolute rounded-full"
              style={{ inset: 16, background: NIGHT_DARK, boxShadow: 'inset 0 0 30px rgba(0,0,0,0.7)' }} />
            {renderWheelSVG({
              sectorList: numberSectors, rotationVal: numberRotation,
              palette: INVERSE_PALETTE, textColors: INVERSE_TEXT,
              accent: SILVER, accentLight: SILVER_LIGHT, border: NIGHT,
              centerImg: null,
              marqueeOnFill: '#F0F9FF', marqueeOffFill: '#475569',
              lightGlow: 'rgba(167,139,250,0.7)',
            })}
            <div className="absolute left-1/2 -translate-x-1/2 pointer-shadow" style={{ top: -6, zIndex: 5 }}>
              <svg width="56" height="80" viewBox="0 0 56 80">
                <defs>
                  <linearGradient id="pSilver" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#F0F9FF" />
                    <stop offset="50%" stopColor="#94A3B8" />
                    <stop offset="100%" stopColor="#334155" />
                  </linearGradient>
                </defs>
                <path d="M 28 0 L 50 20 L 36 30 L 28 76 L 20 30 L 6 20 Z"
                  fill="url(#pSilver)" stroke={NIGHT} strokeWidth="3" strokeLinejoin="round" />
                <circle cx="28" cy="18" r="4" fill="#F0F9FF" />
              </svg>
            </div>
          </div>

          {!numberWinner ? (
            <button onClick={spinNumberWheel} disabled={numberSpinning}
              className={`mt-8 font-shade text-3xl px-16 py-5 rounded-full transition-transform ${
                numberSpinning ? 'opacity-60 cursor-not-allowed' : 'spin-btn-pulse-cool hover:scale-105'
              }`}
              style={{
                background: `linear-gradient(180deg, ${SILVER_LIGHT}, ${SILVER} 50%, #475569)`,
                color: NIGHT, border: `4px solid ${NIGHT}`,
              }}>
              {numberSpinning ? 'SPINNING…' : 'SPIN!'}
            </button>
          ) : (
            <div className="mt-8 text-center">
              <p className="font-bungee text-sm" style={{ color: SILVER_LIGHT, opacity: 0.8 }}>YOU LANDED ON</p>
              <div className="font-shade text-7xl sm:text-8xl my-2" style={{ color: '#A78BFA' }}>
                {numberWinner.label}
              </div>
              <p className="font-display text-xl mb-6" style={{ color: SILVER_LIGHT }}>
                {parseInt(numberWinner.label) === 1 ? 'person celebrates!' : 'people celebrate together!'}
              </p>
              <button onClick={continueFromNumberSpin}
                className="font-shade text-xl px-10 py-3 rounded-full transition-transform hover:scale-105 inline-flex items-center gap-2"
                style={{
                  background: `linear-gradient(180deg, ${SILVER_LIGHT}, ${SILVER})`,
                  color: NIGHT, border: `4px solid ${NIGHT}`,
                }}>
                PICK A PRIZE <Gift size={20} />
              </button>
            </div>
          )}
        </div>
      )}

      {/* ============== BOXES ============== */}
      {view === 'boxes' && (
        <div className="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-20 fade-in">
          <PrizeRoundHeader />
          <div className="max-w-4xl w-full text-center">
            <p className="font-bungee text-xs sm:text-sm tracking-widest" style={{ color: GOLD_LIGHT }}>
              ✦  PICK A MYSTERY BOX  ✦
            </p>
            <h2 className="font-shade title-shimmer text-4xl sm:text-6xl mt-2 mb-2" style={{ color: GOLD_LIGHT, lineHeight: 1 }}>
              WHAT'S INSIDE?
            </h2>
            {bonusOutcome === 'correct' && celebrationCount > 1 && (
              <p className="font-display text-lg mb-2" style={{ color: '#FDF6E3' }}>
                {celebrationCount} people will celebrate this prize together!
              </p>
            )}

            <div className="grid grid-cols-3 gap-3 sm:gap-5 max-w-2xl mx-auto mt-8">
              {boxes.map((b, i) => {
                const isPicked = selectedBox === i;
                const isOther = selectedBox !== null && selectedBox !== i;
                return (
                  <button key={i} onClick={() => selectBox(i)}
                    disabled={selectedBox !== null}
                    className={`relative aspect-square rounded-xl ${isPicked ? 'box-open' : ''} ${isOther ? 'opacity-30' : ''}`}
                    style={{
                      background: isPicked
                        ? `linear-gradient(135deg, ${GOLD_LIGHT}, ${GOLD})`
                        : 'linear-gradient(135deg, #C8102E, #8B0F2A)',
                      border: `4px solid ${isPicked ? DEEP_RED : GOLD}`,
                      boxShadow: isPicked
                        ? `0 0 30px rgba(255,210,63,0.8), 0 0 0 2px ${DEEP_RED}`
                        : '0 6px 0 rgba(0,0,0,0.4)',
                      transition: 'opacity 0.3s, transform 0.2s',
                    }}>
                    {!isPicked ? (
                      <>
                        <div className="absolute inset-0 flex items-center justify-center">
                          <span className="font-shade text-5xl sm:text-7xl" style={{ color: GOLD_LIGHT, textShadow: '4px 4px 0 rgba(0,0,0,0.4)' }}>?</span>
                        </div>
                        <div className="absolute top-1 left-1 right-1 h-2 rounded-t" style={{ background: GOLD_LIGHT, opacity: 0.3 }} />
                      </>
                    ) : (
                      <div className="absolute inset-0 flex flex-col items-center justify-center p-2 text-center">
                        <Gift size={28} style={{ color: DEEP_RED }} />
                        <div className="font-shade text-base sm:text-xl mt-2 break-words" style={{ color: DEEP_RED, lineHeight: 1.1 }}>
                          {b}
                        </div>
                      </div>
                    )}
                  </button>
                );
              })}
            </div>

            {selectedBox === null && (
              <p className="font-bungee text-xs mt-6" style={{ color: '#FDF6E3', opacity: 0.6 }}>
                Click any box to reveal what's inside.
              </p>
            )}
          </div>
        </div>
      )}

      {/* ============== FINAL CELEBRATION ============== */}
      {view === 'final' && (
        <div className="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-20 fade-in">
          <div className="max-w-3xl w-full text-center">
            <Trophy size={80} className="mx-auto mb-4" style={{ color: GOLD_LIGHT }} />
            <p className="font-bungee text-sm tracking-widest mb-1" style={{ color: GOLD_LIGHT }}>
              ✦  PRIZE AWARDED  ✦
            </p>
            <h2 className="font-shade title-shimmer text-4xl sm:text-6xl mb-2" style={{ color: GOLD_LIGHT, lineHeight: 1 }}>
              {winner?.label?.toUpperCase()}
            </h2>
            <p className="font-display text-xl mb-1" style={{ color: '#FDF6E3' }}>WINS</p>
            <div className="font-shade text-3xl sm:text-5xl my-4 px-6 py-4 rounded-2xl inline-block"
              style={{
                background: `linear-gradient(135deg, ${GOLD_LIGHT}, ${GOLD})`,
                color: DEEP_RED, border: `4px solid ${DEEP_RED}`,
                boxShadow: `0 0 0 3px ${GOLD_LIGHT}, 0 12px 32px rgba(0,0,0,0.5)`,
                lineHeight: 1.1,
              }}>
              {selectedBox !== null ? boxes[selectedBox] : ''}
            </div>

            <div className="mt-8 mb-10">
              {celebrationCount > 1 ? (
                <>
                  <p className="font-display text-xl" style={{ color: '#FDF6E3' }}>And</p>
                  <div className="font-shade text-7xl sm:text-8xl my-2" style={{ color: GOLD_LIGHT }}>
                    {celebrationCount}
                  </div>
                  <p className="font-display text-xl" style={{ color: '#FDF6E3' }}>
                    PEOPLE GET TO CELEBRATE TOGETHER!
                  </p>
                </>
              ) : (
                <p className="font-display text-2xl" style={{ color: '#FDF6E3' }}>
                  Solo celebration — well earned!
                </p>
              )}
            </div>

            <button onClick={finishPrizeRound}
              className="font-shade text-2xl px-12 py-4 rounded-full transition-transform hover:scale-105"
              style={{
                background: `linear-gradient(180deg, ${GOLD_LIGHT}, ${GOLD} 45%, #8B6914)`,
                color: DEEP_RED, border: `4px solid ${DEEP_RED}`,
              }}>
              BACK TO WHEEL
            </button>
          </div>
        </div>
      )}

      <div className={`h-3 w-full relative z-10 ${view === 'numberSpin' ? 'tent-stripes-cool' : 'tent-stripes'}`} />

      <canvas ref={celebCanvasRef} className="fixed inset-0 pointer-events-none z-40"
        style={{ width: '100vw', height: '100vh' }} />

      {/* BOOM overlay (timer expired) */}
      {showBoom && (
        <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none">
          <div className="absolute inset-0 flash-overlay"
            style={{ background: 'radial-gradient(ellipse at center, rgba(255,210,63,0.95) 0%, rgba(255,107,53,0.7) 30%, rgba(200,16,46,0.4) 60%, transparent 90%)' }} />
          <div className="boom-text font-shade text-8xl sm:text-9xl"
            style={{ color: '#FFD23F', textShadow: '6px 6px 0 #C8102E, 12px 12px 0 rgba(0,0,0,0.6)' }}>
            BOOM!
          </div>
        </div>
      )}

      {/* Winner modal */}
      {showWinner && winner && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
          style={{ background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(4px)' }}
          onClick={skipPrizeRound}>
          <div className="winner-pop relative max-w-lg w-full text-center px-8 py-10 rounded-3xl"
            style={{
              background: `linear-gradient(135deg, ${GOLD_LIGHT}, ${GOLD} 50%, ${GOLD_LIGHT})`,
              border: `6px solid ${DEEP_RED}`,
              boxShadow: `0 0 0 3px ${GOLD_LIGHT}, 0 30px 60px rgba(0,0,0,0.6)`,
            }}
            onClick={(e) => e.stopPropagation()}>
            <div className="font-bungee text-sm mb-2" style={{ color: DEEP_RED }}>
              ★  WE HAVE A WINNER  ★
            </div>
            <div className="font-display text-2xl mb-1" style={{ color: DEEP_RED }}>CONGRATULATIONS!</div>
            <div className="font-shade text-4xl sm:text-5xl my-6 break-words" style={{ color: DEEP_RED, lineHeight: 1.05 }}>
              {winner.label.toUpperCase()}
            </div>
            <div className="flex flex-col gap-3">
              <button onClick={goToPrizeRound}
                className="font-shade text-lg sm:text-xl px-6 py-3 rounded-full transition-transform hover:scale-105 inline-flex items-center justify-center gap-2"
                style={{ background: DEEP_RED, color: GOLD_LIGHT, border: `3px solid ${DEEP_RED}` }}>
                CONTINUE TO PRIZE ROUND <Gift size={20} />
              </button>
              <button onClick={skipPrizeRound}
                className="font-bungee text-sm px-6 py-2 rounded-full transition-colors"
                style={{ background: 'transparent', color: DEEP_RED, border: `2px solid ${DEEP_RED}` }}>
                {removeWinner ? 'REMOVE & SPIN AGAIN' : 'SPIN AGAIN'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== Helper components =====================

function ToggleRow({ label, hint, on, onClick }) {
  return (
    <div className="flex items-center justify-between gap-3">
      <div className="flex-1">
        <div className="font-bungee text-sm" style={{ color: DEEP_RED }}>{label}</div>
        {hint && <div className="text-xs mt-0.5" style={{ color: DEEP_RED, opacity: 0.7 }}>{hint}</div>}
      </div>
      <div className={`toggle-track ${on ? 'on' : ''}`} onClick={onClick}>
        <div className="toggle-thumb" />
      </div>
    </div>
  );
}

function Section({ title, icon: Icon, isOpen, onToggle, children }) {
  return (
    <div className="rounded-lg overflow-hidden" style={{ border: `2px solid rgba(92,10,28,0.15)` }}>
      <button onClick={onToggle}
        className="w-full px-4 py-3 flex justify-between items-center transition-colors"
        style={{ background: isOpen ? `linear-gradient(90deg, rgba(92,10,28,0.08), rgba(212,160,23,0.1))` : 'rgba(92,10,28,0.04)' }}>
        <div className="flex items-center gap-2">
          {Icon && <Icon size={16} style={{ color: DEEP_RED }} />}
          <span className="font-bungee text-sm" style={{ color: DEEP_RED }}>{title}</span>
        </div>
        {isOpen ? <ChevronUp size={18} style={{ color: DEEP_RED }} /> : <ChevronDown size={18} style={{ color: DEEP_RED }} />}
      </button>
      {isOpen && <div className="p-3">{children}</div>}
    </div>
  );
}

function Fuse({ side, progress, expired, urgent }) {
  // progress: 1.0 = full time, 0.0 = expired
  // Rope sits at the bottom; flame sits at the top of the rope (where the burn line is).
  const ropePct = progress * 100;
  const flameTopPct = 100 - ropePct; // flame y position from top
  const sideStyle = side === 'left' ? { left: 8 } : { right: 8 };

  return (
    <div className="fixed top-0 bottom-0 z-30 pointer-events-none"
      style={{ ...sideStyle, width: 36 }}>
      {/* Rope (unburned) */}
      <div
        className="fuse-rope-bg absolute bottom-0 left-0 right-0"
        style={{ height: `${ropePct}%`, transition: 'height 0.05s linear' }}
      />
      {/* Flame at the burning tip */}
      {!expired && progress > 0.005 && (
        <div className="absolute left-1/2 -translate-x-1/2"
          style={{
            top: `calc(${flameTopPct}% - 28px)`,
            width: 56, height: 56,
            transition: 'top 0.05s linear',
          }}>
          <svg viewBox="0 0 60 60" className={`flame-flicker ${urgent ? 'flame-urgent' : ''}`}
            style={{ width: '100%', height: '100%' }}>
            <defs>
              <radialGradient id={`flameOuter_${side}`} cx="50%" cy="80%" r="55%">
                <stop offset="0%" stopColor="#FFD23F" />
                <stop offset="50%" stopColor="#FF6B35" />
                <stop offset="100%" stopColor="#C8102E" stopOpacity="0.7" />
              </radialGradient>
              <radialGradient id={`flameInner_${side}`} cx="50%" cy="85%" r="40%">
                <stop offset="0%" stopColor="#FFFFFF" />
                <stop offset="60%" stopColor="#FFD23F" />
                <stop offset="100%" stopColor="#FF6B35" stopOpacity="0" />
              </radialGradient>
            </defs>
            {/* Outer flame */}
            <path d="M 30 58 Q 8 50, 14 28 Q 20 14, 18 4 Q 28 22, 34 10 Q 42 26, 40 40 Q 48 52, 30 58 Z"
              fill={`url(#flameOuter_${side})`} />
            {/* Inner flame */}
            <path d="M 30 52 Q 18 46, 22 30 Q 26 20, 28 12 Q 32 24, 34 30 Q 38 42, 30 52 Z"
              fill={`url(#flameInner_${side})`} />
          </svg>
          {/* Sparks */}
          <div className="spark" style={{ left: 8, top: 4, animationDelay: '0s', '--dx': '-6px' }} />
          <div className="spark" style={{ left: 26, top: 8, animationDelay: '0.3s', '--dx': '4px' }} />
          <div className="spark" style={{ left: 16, top: 0, animationDelay: '0.6s', '--dx': '8px' }} />
          {urgent && (
            <div className="spark" style={{ left: 22, top: 6, animationDelay: '0.15s', background: '#FFFFFF', '--dx': '-4px' }} />
          )}
        </div>
      )}
    </div>
  );
}

function DefaultIncorrectGraphic({ isTimeout }) {
  return (
    <svg viewBox="0 0 400 400" className="w-full max-w-xs mx-auto"
      style={{
        filter: 'drop-shadow(0 8px 16px rgba(0,0,0,0.4))',
        background: '#FFF8E7',
        borderRadius: 16,
        border: `4px solid ${GOLD}`,
      }}>
      {/* Background burst */}
      <defs>
        <radialGradient id="redBurst" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stopColor="#FFE066" />
          <stop offset="35%" stopColor="#FFD23F" />
          <stop offset="100%" stopColor="#FFF8E7" />
        </radialGradient>
      </defs>
      <rect width="400" height="400" fill="url(#redBurst)" />
      {/* Starburst rays */}
      {Array.from({ length: 12 }).map((_, i) => {
        const angle = (i / 12) * Math.PI * 2;
        const x1 = 200 + Math.cos(angle) * 40;
        const y1 = 200 + Math.sin(angle) * 40;
        const x2 = 200 + Math.cos(angle) * 200;
        const y2 = 200 + Math.sin(angle) * 200;
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#C8102E" strokeWidth="6" opacity="0.25" />;
      })}
      {/* Big X */}
      <line x1="100" y1="100" x2="300" y2="300" stroke="#C8102E" strokeWidth="44" strokeLinecap="round" />
      <line x1="300" y1="100" x2="100" y2="300" stroke="#C8102E" strokeWidth="44" strokeLinecap="round" />
      {/* Inner highlight */}
      <line x1="100" y1="100" x2="300" y2="300" stroke="#FF6B35" strokeWidth="14" strokeLinecap="round" opacity="0.6" />
      <line x1="300" y1="100" x2="100" y2="300" stroke="#FF6B35" strokeWidth="14" strokeLinecap="round" opacity="0.6" />
      {/* Label */}
      <text x="200" y="378" textAnchor="middle" fill="#5C0A1C"
        fontSize="34" fontFamily="Bungee, Alfa Slab One, sans-serif" fontWeight="bold"
        stroke="#FFD23F" strokeWidth="2" paintOrder="stroke">
        {isTimeout ? 'TIME\'S UP!' : 'INCORRECT'}
      </text>
    </svg>
  );
}

    // ========== Mount ==========
    const rootEl = document.getElementById('root');
    rootEl.innerHTML = '';
    const root = ReactDOM.createRoot(rootEl);
    root.render(<CarnivalSpinner />);
  </script>
</body>
</html>
